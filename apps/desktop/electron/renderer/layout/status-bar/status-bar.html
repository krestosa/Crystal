<footer class="crystal-status-bar">
  <div class="crystal-status-bar__context">
    <span class="crystal-status-bar__product">Crystal</span>
  </div>
  <div class="crystal-status-bar__runtime">
    <span class="crystal-status-bar__badge crystal-shell-status-badge crystal-shell-status-badge--boxed" data-crystal-runtime-status>Renderer isolated</span>
    <div class="crystal-status-bar__controls" aria-label="Developer controls">
      <button class="crystal-status-bar__icon-button crystal-status-bar__diagnostics-button crystal-shell-icon-button" type="button" aria-label="Toggle diagnostics" aria-controls="crystal-design-diagnostics-popover" aria-expanded="false" title="Diagnostics" data-crystal-diagnostics-toggle></button>
      <button class="crystal-status-bar__icon-button crystal-status-bar__devtools-button crystal-shell-icon-button" type="button" aria-label="Open DevTools" title="Open DevTools" data-crystal-devtools-toggle></button>
    </div>
  </div>
</footer>
