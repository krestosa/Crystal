<section class="crystal-project-design-canvas" data-project-design-canvas aria-label="Design Canvas navigation">
  <div class="crystal-project-design-canvas__toolbar" data-project-design-canvas-toolbar>
    <div>
      <h3 class="crystal-project-design-canvas__title">Design Canvas</h3>
      <p class="crystal-project-design-canvas__hint">Wheel scrolls Preview. Ctrl + wheel/pinch zooms. Double-tap drag up/down zooms. Space or middle drag pans.</p>
    </div>
    <div class="crystal-project-design-canvas__controls">
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-fit>Fit</button>
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-center>Center</button>
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-reset>Reset</button>
      <span class="crystal-project-design-canvas__zoom" data-project-design-canvas-zoom>100%</span>
    </div>
  </div>
  <div class="crystal-project-design-canvas__surface" data-project-design-canvas-surface tabindex="0" aria-label="Design Canvas viewport">
    <div class="crystal-project-design-canvas__stage" data-project-design-canvas-stage>
      <div class="crystal-project-design-canvas__page-frame" data-project-design-canvas-page-frame>
        <div class="crystal-project-design-canvas__page-header">
          <span>Desktop frame</span>
          <span>1280 × 720</span>
        </div>
        <div class="crystal-project-preview-panel__frame-wrap">
          <iframe class="crystal-project-preview-panel__frame" data-project-preview-frame title="Crystal project preview" sandbox="allow-scripts allow-forms allow-popups"></iframe>
        </div>
      </div>
    </div>
    <div class="crystal-project-design-canvas__capture" data-project-design-canvas-capture aria-hidden="true"></div>
  </div>
</section>
