<section class="crystal-project-design-canvas" data-project-design-canvas aria-label="Design Canvas navigation">
  <div class="crystal-project-design-canvas__toolbar" data-project-design-canvas-toolbar>
    <div class="crystal-project-design-canvas__identity">
      <h3 class="crystal-project-design-canvas__title">Canvas</h3>
      <p class="crystal-project-design-canvas__hint">Ctrl wheel zoom · Space drag pan · Wheel scrolls Preview</p>
    </div>
    <div class="crystal-project-design-canvas__controls">
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-fit>Fit</button>
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-center>Center</button>
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-reset>Reset</button>
      <button class="crystal-project-design-canvas__button" type="button" data-project-design-canvas-selection-overlay-toggle aria-pressed="true">Overlay</button>
      <span class="crystal-project-design-canvas__zoom" data-project-design-canvas-zoom>100%</span>
    </div>
  </div>
  <div class="crystal-project-design-canvas__surface" data-project-design-canvas-surface tabindex="0" aria-label="Design Canvas viewport">
    <div class="crystal-project-design-canvas__start" data-crystal-start-screen>
      <div class="crystal-project-design-canvas__start-icon" aria-hidden="true">▣</div>
      <div>
        <h2 class="crystal-project-design-canvas__start-title">Open a project</h2>
        <p class="crystal-project-design-canvas__start-text">Choose a folder or an HTML file to start.</p>
      </div>
      <div class="crystal-project-design-canvas__start-actions">
        <button class="crystal-project-design-canvas__start-action" type="button" data-project-open-folder><span>Open Folder</span><small>Project root</small></button>
        <button class="crystal-project-design-canvas__start-action" type="button" data-project-open-html><span>Open HTML</span><small>Single file</small></button>
      </div>
    </div>
    <div class="crystal-project-design-canvas__stage" data-project-design-canvas-stage>
      <div class="crystal-project-design-canvas__page-frame" data-project-design-canvas-page-frame>
        <div class="crystal-project-design-canvas__page-header">
          <span>Desktop frame</span>
          <span>1280 × 720</span>
        </div>
        <div class="crystal-project-preview-panel__frame-wrap">
          <iframe class="crystal-project-preview-panel__frame" data-project-preview-frame title="Crystal project preview" sandbox="allow-scripts allow-forms allow-popups"></iframe>
          <div class="crystal-project-design-canvas__selection-overlay" data-project-design-canvas-selection-overlay data-project-design-canvas-selection-overlay-status="hidden" aria-hidden="true" hidden>
            <div class="crystal-project-design-canvas__selection-box" data-project-design-canvas-selection-box hidden></div>
            <div class="crystal-project-design-canvas__selection-message" data-project-design-canvas-selection-message hidden></div>
          </div>
        </div>
      </div>
    </div>
    <div class="crystal-project-design-canvas__capture" data-project-design-canvas-capture aria-hidden="true"></div>
  </div>
</section>
