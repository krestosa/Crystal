<section class="crystal-html-element-library-panel crystal-shell-panel crystal-shell-panel--compact crystal-shell-panel-stack__tool" aria-label="HTML Element Library" data-html-element-library-panel>
  <header class="crystal-html-element-library-panel__header crystal-shell-panel-header">
    <div class="crystal-shell-panel-header__identity">
      <h2 class="crystal-shell-panel-header__title">Element Library</h2>
    </div>
    <span class="crystal-html-element-library-panel__badge crystal-shell-status-badge">Read-only</span>
  </header>

  <div class="crystal-html-element-library-panel__body crystal-shell-panel__body">
    <div class="crystal-html-element-library-panel__category-tabs crystal-shell-scroll-region crystal-shell-scroll-region--x" role="tablist" aria-label="Element categories" data-html-element-library-category-tabs></div>
    <div class="crystal-html-element-library-panel__item-list crystal-shell-scroll-region" role="list" aria-label="Active element category" data-html-element-library-item-list></div>

    <p class="crystal-html-element-library-panel__target-line crystal-shell-empty-state crystal-shell-empty-state--compact" data-html-element-library-target-summary>Target: No project</p>

    <p class="crystal-html-element-library-panel__empty crystal-shell-empty-state crystal-shell-empty-state--compact" data-html-element-library-selected-empty>Select an element</p>
    <section class="crystal-html-element-library-panel__selected crystal-shell-section crystal-shell-section--compact" aria-label="Selected element" data-html-element-library-selected-panel hidden>
      <div class="crystal-html-element-library-panel__selected-header">
        <span data-html-element-library-selected-title></span>
        <span data-html-element-library-selected-kind></span>
      </div>
      <p data-html-element-library-selected-description></p>
      <dl class="crystal-html-element-library-panel__selected-details crystal-shell-metadata" data-html-element-library-selected-details></dl>
    </section>

    <div class="crystal-html-element-library-panel__mode-picker crystal-shell-section crystal-shell-section--compact" role="group" aria-label="Insertion mode" data-html-element-library-insertion-mode-picker></div>

    <div class="crystal-html-element-library-panel__command-row crystal-shell-section crystal-shell-section--compact">
      <div class="crystal-html-element-library-panel__patch-preview" data-html-element-library-patch-preview>
        <p class="crystal-shell-empty-state crystal-shell-empty-state--compact">Preview: select an element</p>
      </div>
      <button class="crystal-html-element-library-panel__future-action crystal-shell-compact-button" type="button" disabled hidden title="Patch preview only" data-html-element-library-future-action>Apply unavailable</button>
    </div>
  </div>
</section>
