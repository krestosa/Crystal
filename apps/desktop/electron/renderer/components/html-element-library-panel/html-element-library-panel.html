<section class="crystal-html-element-library-panel" aria-label="HTML Element Library" data-html-element-library-panel>
  <header class="crystal-html-element-library-panel__header">
    <h2>Element Library</h2>
    <span class="crystal-html-element-library-panel__badge">Read-only</span>
  </header>

  <div class="crystal-html-element-library-panel__body">
    <div class="crystal-html-element-library-panel__category-tabs" role="tablist" aria-label="Element categories" data-html-element-library-category-tabs></div>
    <div class="crystal-html-element-library-panel__item-list" role="list" aria-label="Active element category" data-html-element-library-item-list></div>

    <p class="crystal-html-element-library-panel__target-line" data-html-element-library-target-summary>Target: No project</p>

    <p class="crystal-html-element-library-panel__empty" data-html-element-library-selected-empty>Select an element</p>
    <section class="crystal-html-element-library-panel__selected" aria-label="Selected element" data-html-element-library-selected-panel hidden>
      <div class="crystal-html-element-library-panel__selected-header">
        <span data-html-element-library-selected-title></span>
        <span data-html-element-library-selected-kind></span>
      </div>
      <p data-html-element-library-selected-description></p>
      <dl class="crystal-html-element-library-panel__selected-details">
        <div data-html-element-library-selected-attributes-row>
          <dt>Attrs</dt>
          <dd data-html-element-library-selected-attributes></dd>
        </div>
        <div data-html-element-library-selected-accessibility-row>
          <dt>A11y</dt>
          <dd data-html-element-library-selected-accessibility></dd>
        </div>
      </dl>
    </section>

    <div class="crystal-html-element-library-panel__command-row">
      <p data-html-element-library-patch-preview>Preview: select an element</p>
      <button class="crystal-html-element-library-panel__future-action" type="button" disabled hidden title="Command foundation only" data-html-element-library-future-action>Command</button>
    </div>
  </div>
</section>
