name: Temporary source export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    name: Export source checkout
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create source archive
        shell: bash
        run: |
          tar --exclude=.git --exclude=node_modules -czf /tmp/crystal-source.tar.gz .
          sha256sum /tmp/crystal-source.tar.gz > /tmp/crystal-source.tar.gz.sha256

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: crystal-source-export
          path: |
            /tmp/crystal-source.tar.gz
            /tmp/crystal-source.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1
