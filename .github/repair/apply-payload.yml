name: Apply repair payload

on:
  push:
    branches:
      - "tooling/generated-metadata-validation-hardening"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[repair-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply exact local repair payload
        shell: bash
        run: |
          tar -xzf .github/repair/pr35-repair-payload.tar.gz
          rm -rf .github/repair
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Align generated metadata outputs and remote report [repair-applied]"
          git push origin HEAD:tooling/generated-metadata-validation-hardening
